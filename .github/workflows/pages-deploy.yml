# Publish the static "skill showcase" hub in `site/` to GitHub Pages on every
# push to `main`.
#
# `site/` is a no-build static site (plain HTML + CDN Tailwind + CDN Phosphor +
# vanilla JS). There is nothing to compile, so we upload the directory as-is.
# All internal links inside the site are relative, so it works unchanged whether
# it is served at the project-site subpath https://<owner>.github.io/<repo>/ or
# at a domain root. No base-path injection is needed.
#
# This replaced the earlier Anvil dashboard deploy. The dashboard code still
# lives in `packages/` for local use; it is just no longer the published artifact.

name: Deploy Pages

on:
  push:
    branches: [main]
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

# Least-privilege token + the Pages deployment permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact (the static site/ directory)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
