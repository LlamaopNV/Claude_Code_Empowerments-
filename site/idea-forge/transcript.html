<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>idea-forge · full debate transcript</title>
<meta name="description" content="The complete transcript of the idea-forge self-improvement tournament: 8 contenders, 7 debates, judge scores, carry-forward edits, and the final gauntlet." />

<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<link rel="stylesheet" href="../shared/site.css" />
<style>
  .doc { max-width: 860px; margin: 0 auto; padding: 40px 20px 90px; }
  .back { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 7px; margin-bottom: 22px; }
  .back:hover { color: #fff; }
  .md { color: var(--text-dim); line-height: 1.7; font-size: 15px; }
  .md h1 { color: var(--text); font-size: 28px; letter-spacing: -0.02em; margin: 0 0 14px; }
  .md h2 { color: var(--text); font-size: 21px; letter-spacing: -0.01em; margin: 38px 0 12px; padding-top: 16px; border-top: 1px solid var(--border); }
  .md h3 { color: var(--text); font-size: 16.5px; margin: 26px 0 10px; }
  .md h4 { color: var(--accent); font-family: var(--font-mono); font-size: 13px; letter-spacing: .03em; margin: 20px 0 8px; }
  .md p { margin: 0 0 14px; }
  .md ul, .md ol { margin: 0 0 14px; padding-left: 22px; display: grid; gap: 6px; }
  .md li { line-height: 1.6; }
  .md strong { color: var(--text); font-weight: 600; }
  .md em { color: var(--text); }
  .md a { color: var(--accent); }
  .md code { font-family: var(--font-mono); font-size: 13px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; color: var(--text); }
  .md pre { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; overflow-x: auto; margin: 0 0 16px; }
  .md pre code { background: none; border: 0; padding: 0; font-size: 12.5px; line-height: 1.6; }
  .md blockquote { margin: 0 0 16px; padding: 4px 16px; border-left: 3px solid var(--accent); color: var(--text-dim); font-style: italic; }
  .md hr { border: 0; border-top: 1px solid var(--border); margin: 30px 0; }
  .md table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 13.5px; }
  .md th, .md td { text-align: left; padding: 9px 12px; border: 1px solid var(--border); }
  .md th { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); font-weight: 500; }
  .fallback a { color: var(--accent); }
</style>
</head>

<body class="font-sans">
<main id="top">
  <div class="doc">
    <a class="back" href="index.html"><i class="ph-bold ph-arrow-left"></i> Back to the overview</a>
    <div class="md" id="content">Loading transcript…</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  fetch('data/transcript.md')
    .then((r) => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then((md) => { document.getElementById('content').innerHTML = marked.parse(md); })
    .catch(() => {
      document.getElementById('content').innerHTML =
        '<p class="fallback">Could not load the transcript inline. <a href="data/transcript.md">Open the raw markdown.</a></p>';
    });
</script>

<script>
  window.SKILL_PAGE = {
    brand: 'skill showcase', brandIcon: 'ph-stack', accent: '#7c6cf0',
    homeUrl: '../', repoUrl: 'https://github.com/llamaopnv',
    navLinks: [
      { label: 'Overview', href: 'index.html' },
      { label: 'v1 vs v2 diff', href: 'compare.html' },
    ],
    footNote: 'idea-forge · full debate transcript',
  };
</script>
<script src="../shared/shell.js" defer></script>
</body>
</html>
