<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>idea-forge · v1 vs v2 diff</title>
<meta name="description" content="The v1 and v2 SKILL.md side by side: what the idea-forge self-improvement tournament actually changed in the skill's own source." />

<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<link rel="stylesheet" href="../shared/site.css" />
<style>
  .cmp-wrap { max-width: 1320px; margin: 0 auto; padding: 40px 20px 90px; }
  .back { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 7px; margin-bottom: 20px; }
  .back:hover { color: #fff; }
  .cmp-head h1 { color: var(--text); font-size: clamp(1.5rem,3vw,2rem); letter-spacing: -0.02em; margin: 0 0 8px; }
  .cmp-head p { color: var(--text-dim); max-width: 720px; line-height: 1.6; margin: 0; }
  .toggle { display: flex; gap: 8px; margin: 22px 0 26px; flex-wrap: wrap; }
  .toggle button { cursor: pointer; }
  .toggle button.on { background: var(--accent); color: #14100a; border-color: var(--accent); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px){ .grid2 { grid-template-columns: 1fr; } }
  .col { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg-2); }
  .col > h3 { margin: 0; padding: 12px 18px; font-family: var(--font-mono); font-size: 13px; border-bottom: 1px solid var(--border); position: sticky; top: 64px; backdrop-filter: blur(8px); z-index: 2; display: flex; align-items: center; gap: 8px; }
  .col-v1 > h3 { background: rgba(215,112,104,0.10); color: var(--text); }
  .col-v1 > h3 i { color: var(--miss); }
  .col-v2 > h3 { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--text); }
  .col-v2 > h3 i { color: var(--accent); }

  .md { color: var(--text-dim); line-height: 1.65; font-size: 13.5px; padding: 18px 20px; }
  .md h1 { color: var(--text); font-size: 20px; margin: 0 0 12px; }
  .md h2 { color: var(--text); font-size: 16px; margin: 22px 0 9px; padding-top: 12px; border-top: 1px solid var(--border); }
  .md h3 { color: var(--text); font-size: 14px; margin: 16px 0 7px; }
  .md h4 { color: var(--accent); font-family: var(--font-mono); font-size: 12px; margin: 14px 0 6px; }
  .md p { margin: 0 0 12px; }
  .md ul, .md ol { margin: 0 0 12px; padding-left: 20px; display: grid; gap: 5px; }
  .md strong { color: var(--text); font-weight: 600; }
  .md em { color: var(--text); }
  .md code { font-family: var(--font-mono); font-size: 12px; background: var(--bg-3); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; color: var(--text); }
  .md pre { background: var(--bg-3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 0 0 14px; }
  .md pre code { background: none; border: 0; padding: 0; font-size: 12px; line-height: 1.55; }
  .md blockquote { margin: 0 0 14px; padding: 3px 14px; border-left: 3px solid var(--accent); font-style: italic; }
  .md table { width: 100%; border-collapse: collapse; margin: 0 0 14px; font-size: 12.5px; }
  .md th, .md td { text-align: left; padding: 7px 10px; border: 1px solid var(--border); }
  .md hr { border: 0; border-top: 1px solid var(--border); margin: 22px 0; }
</style>
</head>

<body class="font-sans">
<main id="top">
  <div class="cmp-wrap">
    <a class="back" href="index.html"><i class="ph-bold ph-arrow-left"></i> Back to the overview</a>
    <div class="cmp-head">
      <h1>v1 to v2, the skill's own source</h1>
      <p>The left column is what the bake-to-completion agent wrote. The right is what the skill produced after forging itself. Same idea, audited machine.</p>
    </div>
    <div class="toggle">
      <button class="btn-ghost btn-sm" data-view="both">Side by side</button>
      <button class="btn-ghost btn-sm" data-view="v1">v1 only</button>
      <button class="btn-ghost btn-sm on" data-view="v2">v2 only</button>
    </div>

    <div class="grid2" id="grid">
      <div class="col col-v1"><h3><i class="ph-bold ph-minus-circle"></i> v1 · SKILL.md (before)</h3><div class="md" id="v1">Loading…</div></div>
      <div class="col col-v2"><h3><i class="ph-bold ph-check-circle"></i> v2 · SKILL.md (after)</h3><div class="md" id="v2">Loading…</div></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  function load(path, id) {
    fetch(path).then((r) => r.text())
      .then((md) => { document.getElementById(id).innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById(id).innerHTML = '<p><a href="' + path + '" style="color:var(--accent)">Open raw.</a></p>'; });
  }
  load('data/v1-SKILL.md', 'v1');
  load('data/v2-SKILL.md', 'v2');

  const grid = document.getElementById('grid');
  const v1 = document.querySelector('.col-v1');
  const v2 = document.querySelector('.col-v2');
  function setView(v) {
    v1.style.display = (v === 'v2') ? 'none' : '';
    v2.style.display = (v === 'v1') ? 'none' : '';
    grid.style.gridTemplateColumns = (v === 'both') ? '' : '1fr';
    document.querySelectorAll('.toggle button').forEach((b) => b.classList.toggle('on', b.dataset.view === v));
  }
  document.querySelectorAll('.toggle button').forEach((b) => b.addEventListener('click', () => setView(b.dataset.view)));
  setView('v2');
</script>

<script>
  window.SKILL_PAGE = {
    brand: 'skill showcase', brandIcon: 'ph-stack', accent: '#7c6cf0',
    homeUrl: '../', repoUrl: 'https://github.com/llamaopnv',
    navLinks: [
      { label: 'Overview', href: 'index.html' },
      { label: 'Transcript', href: 'transcript.html' },
    ],
    footNote: 'idea-forge · v1 vs v2 diff',
  };
</script>
<script src="../shared/shell.js" defer></script>
</body>
</html>
